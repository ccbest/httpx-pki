name: Publish

on:
  release:
    types: [published]

# Least privilege: the build job only reads the repo. The publish job adds
# id-token: write for itself (job-level permissions replace, not extend).
permissions:
  contents: read

# All actions are pinned to full commit SHAs (the tag is a comment): tags are
# mutable and have been repointed at malicious commits in real supply-chain
# attacks. Dependabot (.github/dependabot.yml) keeps the pins current.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      # The version is single-sourced from __version__ in httpx_pki/__init__.py
      # (pyproject declares it dynamic and hatchling reads it from there).
      - name: Verify the release tag matches the package version
        run: |
          PKG_VERSION=$(python -c "
          import pathlib, re
          text = pathlib.Path('httpx_pki/__init__.py').read_text()
          print(re.search(r'^__version__ = \"([^\"]+)\"', text, re.M).group(1))
          ")
          TAG="${GITHUB_REF_NAME#v}"
          echo "tag=$TAG __version__=$PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::release tag '$GITHUB_REF_NAME' does not match __version__ '$PKG_VERSION' in httpx_pki/__init__.py"
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC): no API token needed. Requires a matching
    # publisher configured on PyPI and a GitHub environment named "pypi".
    environment:
      name: pypi
      url: https://pypi.org/p/httpx-pki
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          # PEP 740 digital attestations: on by default with Trusted
          # Publishing, stated explicitly so it can't regress silently.
          attestations: true
