name: Publish (TestPyPI)

# Manual dry run of the release pipeline against TestPyPI. Trigger it from the
# Actions tab ("Run workflow"). Each run stamps a unique .devN version so it can
# be run repeatedly -- TestPyPI refuses to overwrite an existing version.

on:
  workflow_dispatch:

permissions:
  contents: read

# Actions are pinned to full commit SHAs (tag in the comment) -- see
# publish.yml for the rationale.
jobs:
  test-publish:
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/httpx-pki
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      # The version is single-sourced from __version__ in httpx_pki/__init__.py
      # (pyproject declares it dynamic and hatchling reads it from there).
      - name: Stamp a unique dev version
        run: |
          python - <<'PY'
          import os, pathlib, re
          run = os.environ["GITHUB_RUN_NUMBER"]
          path = pathlib.Path("httpx_pki/__init__.py")
          text = path.read_text()
          text, n = re.subn(
              r'(?m)^(__version__ = ")([^"]+)(")',
              lambda m: f"{m.group(1)}{m.group(2)}.dev{run}{m.group(3)}",
              text,
              count=1,
          )
          assert n == 1, "could not find the __version__ line"
          path.write_text(text)
          print("stamped:", re.search(r'(?m)^__version__ = .*', text).group(0))
          PY

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
