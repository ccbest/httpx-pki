name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pylint
        run: pylint httpx_pki --fail-under=9.9
      - name: Mypy
        run: mypy httpx_pki
      - name: Pytest (coverage)
        run: pytest -q --cov=httpx_pki --cov-report=term-missing --cov-fail-under=80
