name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Actions are pinned to full commit SHAs (tag in the comment) -- see
# publish.yml for the rationale.
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # Lint/type-checks are platform-independent; run them once on Linux.
      - name: Ruff
        if: runner.os == 'Linux'
        run: ruff check .
      - name: Pylint
        if: runner.os == 'Linux'
        run: pylint httpx_pki --fail-under=9.9
      - name: Mypy
        if: runner.os == 'Linux'
        run: mypy httpx_pki
      # Run the suite on all three OSes -- Windows exercises the crypt32 ctypes
      # module, and macOS (opted in via HTTPX_PKI_KEYCHAIN_TESTS, so developer
      # Macs are never touched implicitly) provisions a throwaway keychain and
      # exercises the Security-framework path end to end.
      - name: Pytest (coverage)
        env:
          HTTPX_PKI_KEYCHAIN_TESTS: ${{ runner.os == 'macOS' && '1' || '' }}
        run: pytest -q --cov=httpx_pki --cov-report=term-missing --cov-report=xml --cov-fail-under=85
      # Upload from a single representative job: the platform-specific winstore
      # code is pragma-excluded, so every matrix cell reports the same lines --
      # one upload keeps the Codecov number stable and avoids 8x merges.
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
